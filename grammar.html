<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Changa+One&family=Geist+Pixel&family=Germania+One&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Lilita+One&family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Oswald:wght@200..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Playwrite+AU+VIC+Guides&family=Puritan:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="grammar.css">
</head>
<body>

    <div class="heading-wrapper d-flex justify-content-md-center mt-4" style="position: relative;">
        <h1>Grammar</h1>
        <div class="button-wrapper justify-content-md-evenly mt-2" style="position: absolute; right: 40px;">
            <button type="button" class="btn btn-light">Home</button>
            <button type="button" class="btn btn-light">Quiz</button>
            <button type="button" class="btn btn-light">About</button>
        </div>
    </div>


    <div class="d-flex justify-content-md-evenly align-items-md-center" style="margin-top: 150px;">

        <div class="card card-one" style="width: 18rem;">
         <img src="./Grammar-images/level-one.svg" class="image-style" alt="study-image" style="margin-bottom: -20px;">
            <div class="card-body">
                <h3 class="card-title text-center">Level 1</h3>
                <h4 style="text-align: center;">Verb Mechanics</h4>
                <button type="button" class="btn btn-light mx-auto d-block">Learn More</button>
            </div>
        </div>

        <div class="card card-two" style="width: 18rem;">
         <img src="./Grammar-images/level-two.svg" class="image-style" alt="study-image" style="margin-bottom: -20px;">
            <div class="card-body">
                <h3 class="card-title text-center">Level 2</h3>
                <h4 style="text-align: center;">Sentence Architecture</h4>
                <button type="button" class="btn btn-light mx-auto d-block">Learn More</button>
            </div>
        </div>

        <div class="card card-three" style="width: 18rem;">
         <img src="./Grammar-images/level-three.svg" class="image-style" alt="study-image" style="margin-bottom: -20px;">
            <div class="card-body">
                <h3 class="card-title text-center">Level 3</h3>
                <h4 style="text-align: center;">Nouns & Cases</h4>
                <button type="button" class="btn btn-light mx-auto d-block">Learn More</button>
            </div>
        </div>

        <div class="card card-four" style="width: 18rem;">
         <img src="./Grammar-images/level-four.svg" class="image-style" alt="study-image" style="margin-bottom: -20px;">
            <div class="card-body">
                <h3 class="card-title text-center">Level 4</h3>
                <h4 style="text-align: center;">Pronouns & Ownership</h4>
                <!--Method to center a button using bootstrap without using any more external div class-->
                <button type="button" class="btn btn-light mx-auto d-block">Learn More</button>
            </div>
        </div>   
        
       

    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
