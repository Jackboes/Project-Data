<body> 

<div class="container min-vh-100 d-flex justify-content-center align-items-center">
    <div class="row w-100">
        <img src="../Facts/login-page.jpg">
        <div class="col-4  mx-auto d-flex align-items-center justify-content-center">
            <form class=" form-style bg-white rounded-4 p-4 w-100"> 
                <h1 class=" h3 mb-3 fw-normal">Please Sign In</h1> 
            <div class="form-floating mb-2"> 
                <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com" fdprocessedid="c0nws"> 
                <label for="floatingInput">Email address</label> 
            </div> 

            <div class="form-floating mb-2"> 
                <input type="password" class="form-control" id="floatingPassword" placeholder="Password" fdprocessedid="x9bck4"> 
                <label for="floatingPassword">Password</label> 
            </div> 

            <div class="form-check text-start my-3"> 
                <input class="form-check-input" type="checkbox" value="remember-me" id="checkDefault"> 
                <label class="form-check-label" for="checkDefault">Remember me</label>
            </div> 

            <button class="but-style btn btn-primary w-100 py-2" type="submit" fdprocessedid="oxmjma">Sign in</button> 
            <p class="mt-5 mb-3 text-body-secondary">© 2025-2029</p> 
            </form>
        </div>
    </div>    

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
